<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FREEFALL — Crash Game</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0e1a;--panel:rgba(15,20,40,0.85);--border:rgba(0,220,255,0.15);
--cyan:#00dcff;--green:#00ff88;--red:#ff3355;--orange:#ff8800;--yellow:#ffcc00;
--text:#e8eaf0;--text-dim:#6a7090;--gold:#ffd700;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;user-select:none}
#app{display:flex;flex-direction:column;height:100%;max-width:500px;margin:0 auto;position:relative}
/* TOP BAR */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);z-index:10}
.top-bar .logo{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:var(--cyan);letter-spacing:2px}
.balance{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--green)}
.balance span{color:var(--text-dim);font-size:11px;margin-right:4px}
.top-icons{display:flex;gap:8px}
.icon-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s}
.icon-btn:hover,.icon-btn.active{color:var(--cyan);border-color:var(--cyan)}

/* HISTORY BAR */
.history-bar{display:flex;gap:4px;padding:6px 12px;overflow-x:auto;background:rgba(10,14,26,0.6);scrollbar-width:none}
.history-bar::-webkit-scrollbar{display:none}
.history-dot{font-family:'Orbitron',sans-serif;font-size:10px;padding:3px 8px;border-radius:12px;white-space:nowrap;flex-shrink:0;font-weight:700}
.history-dot.green{background:rgba(0,255,136,0.15);color:var(--green)}
.history-dot.red{background:rgba(255,51,85,0.15);color:var(--red)}
.history-dot.gold{background:rgba(255,215,0,0.15);color:var(--gold)}

/* GAME CANVAS */
.game-area{flex:1;position:relative;overflow:hidden;min-height:0}
#gameCanvas{width:100%;height:100%;display:block}
.multiplier-overlay{position:absolute;top:15%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-weight:900;text-align:center;pointer-events:none;z-index:5;text-shadow:0 0 30px rgba(0,220,255,0.4)}
.multiplier-text{font-size:52px;line-height:1;transition:color .3s}
.multiplier-label{font-size:10px;color:var(--text-dim);letter-spacing:3px;margin-top:2px}
.phase-text{position:absolute;top:15%;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;text-align:center;pointer-events:none;z-index:5}
.countdown-text{color:var(--cyan);animation:pulse 1s ease infinite}
.crashed-text{color:var(--red);animation:crashShake .3s ease}
.cashout-text{color:var(--green)}
@keyframes pulse{0%,100%{transform:translateX(-50%) scale(1);opacity:1}50%{transform:translateX(-50%) scale(1.1);opacity:0.8}}
@keyframes crashShake{0%,100%{transform:translateX(-50%)}25%{transform:translateX(calc(-50% + 8px))}75%{transform:translateX(calc(-50% - 8px))}}

/* PLAYERS PANEL */
.players-panel{position:absolute;right:8px;top:8px;width:130px;z-index:5;pointer-events:none}
.player-entry{display:flex;justify-content:space-between;align-items:center;padding:3px 8px;margin-bottom:2px;border-radius:6px;font-size:10px;background:rgba(15,20,40,0.7);backdrop-filter:blur(4px)}
.player-entry .name{color:var(--text-dim)}
.player-entry .mult{font-family:'Orbitron',sans-serif;font-weight:700}
.player-entry.active .mult{color:var(--cyan)}
.player-entry.won .mult{color:var(--green)}
.player-entry.lost .mult{color:var(--red)}

/* BOTTOM PANEL */
.bottom-panel{background:var(--panel);border-top:1px solid var(--border);backdrop-filter:blur(12px);padding:10px 12px 14px;z-index:10}
.bet-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.bet-input-group{flex:1;display:flex;align-items:center;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.bet-input-group button{background:none;border:none;color:var(--cyan);font-size:18px;padding:8px 12px;cursor:pointer;font-weight:700}
.bet-input-group button:active{background:rgba(0,220,255,0.1)}
.bet-input-group input{flex:1;background:none;border:none;color:var(--text);text-align:center;font-size:16px;font-family:'Orbitron',sans-serif;outline:none;width:60px;padding:8px 0}
.presets{display:flex;gap:4px;flex-wrap:wrap}
.preset-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);padding:6px 10px;font-size:11px;cursor:pointer;font-weight:600;transition:all .2s}
.preset-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.action-row{display:flex;gap:8px;margin-bottom:8px}
.btn-main{flex:2;padding:14px;border:none;border-radius:12px;font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;cursor:pointer;transition:all .2s;letter-spacing:1px}
.btn-bet{background:linear-gradient(135deg,#00dcff,#0088ff);color:#000;box-shadow:0 4px 20px rgba(0,220,255,0.3)}
.btn-bet:active{transform:scale(0.97)}
.btn-bet:disabled{background:linear-gradient(135deg,#333,#444);color:#666;box-shadow:none;cursor:not-allowed}
.btn-cashout{background:linear-gradient(135deg,#00ff88,#00cc66);color:#000;box-shadow:0 4px 20px rgba(0,255,136,0.3);animation:cashoutPulse 1.5s ease infinite}
.btn-cashout:active{transform:scale(0.97)}
@keyframes cashoutPulse{0%,100%{box-shadow:0 4px 20px rgba(0,255,136,0.3)}50%{box-shadow:0 4px 30px rgba(0,255,136,0.5)}}
.btn-waiting{background:linear-gradient(135deg,#333,#444);color:#888;cursor:not-allowed}
.options-row{display:flex;gap:8px;align-items:center}
.option-group{display:flex;align-items:center;gap:6px;flex:1}
.option-label{font-size:10px;color:var(--text-dim);white-space:nowrap}
.toggle{position:relative;width:36px;height:20px;background:rgba(255,255,255,0.1);border-radius:10px;cursor:pointer;transition:background .3s;flex-shrink:0}
.toggle.on{background:var(--cyan)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:white;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}
.auto-input{width:60px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:'Orbitron',sans-serif;text-align:center;padding:4px;outline:none}
.auto-input:focus{border-color:var(--cyan)}

/* SIDE BET */
.side-bet-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:6px 10px;background:rgba(255,215,0,0.05);border:1px solid rgba(255,215,0,0.15);border-radius:10px}
.side-bet-row .option-label{color:var(--gold)}

/* PROVABLY FAIR */
.pf-section{position:absolute;bottom:100%;left:0;right:0;background:var(--panel);border-top:1px solid var(--border);backdrop-filter:blur(12px);padding:12px;z-index:20;transform:translateY(100%);opacity:0;transition:all .3s;pointer-events:none}
.pf-section.open{transform:translateY(0);opacity:1;pointer-events:all}
.pf-title{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--cyan);margin-bottom:8px;letter-spacing:1px}
.pf-hash{font-size:10px;color:var(--text-dim);word-break:break-all;background:rgba(0,0,0,0.3);padding:6px;border-radius:6px;margin-bottom:4px;font-family:monospace}
.pf-label{font-size:9px;color:var(--text-dim);margin-bottom:2px}

/* WIND EVENT INDICATOR */
.wind-indicator{position:absolute;top:50%;left:12px;transform:translateY(-50%);z-index:6;pointer-events:none;opacity:0;transition:opacity .5s}
.wind-indicator.visible{opacity:1}
.wind-icon{font-size:20px}
.wind-label{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div class="logo">FREEFALL</div>
    <div class="balance"><span>$</span><span id="balanceDisplay">1000.00</span></div>
    <div class="top-icons">
      <button class="icon-btn" id="soundToggle" title="Sound">🔊</button>
      <button class="icon-btn" id="fairToggle" title="Provably Fair">🔒</button>
    </div>
  </div>
  <div class="history-bar" id="historyBar"></div>
  <div class="game-area">
    <canvas id="gameCanvas"></canvas>
    <div class="multiplier-overlay" id="multiplierOverlay" style="display:none">
      <div class="multiplier-text" id="multiplierText">1.00x</div>
      <div class="multiplier-label">ALTITUDE</div>
    </div>
    <div class="phase-text" id="phaseText" style="display:none"></div>
    <div class="players-panel" id="playersPanel"></div>
    <div class="wind-indicator" id="windIndicator">
      <div class="wind-icon" id="windIcon"></div>
      <div class="wind-label" id="windLabel"></div>
    </div>
    <div class="pf-section" id="pfSection">
      <div class="pf-title">PROVABLY FAIR</div>
      <div class="pf-label">Round Hash (before)</div>
      <div class="pf-hash" id="pfHash">-</div>
      <div class="pf-label">Seed (revealed after crash)</div>
      <div class="pf-hash" id="pfSeed">-</div>
      <div class="pf-label">Crash Point</div>
      <div class="pf-hash" id="pfCrash">-</div>
    </div>
  </div>
  <div class="bottom-panel">
    <div class="side-bet-row" id="sideBetRow">
      <span class="option-label" style="color:var(--gold)">TRICK BET</span>
      <div class="toggle" id="sideBetToggle"></div>
      <span class="option-label">Target:</span>
      <input type="number" class="auto-input" id="sideBetTarget" value="3.00" min="1.5" max="1000" step="0.5">
      <span class="option-label" style="font-size:9px;color:var(--gold)">3:1</span>
    </div>
    <div class="bet-row">
      <div class="bet-input-group">
        <button id="betMinus">−</button>
        <input type="number" id="betInput" value="10" min="1" max="500" step="1">
        <button id="betPlus">+</button>
      </div>
      <div class="presets">
        <button class="preset-btn" data-amt="1">$1</button>
        <button class="preset-btn" data-amt="5">$5</button>
        <button class="preset-btn" data-amt="10">$10</button>
        <button class="preset-btn" data-amt="25">$25</button>
        <button class="preset-btn" data-amt="50">$50</button>
        <button class="preset-btn" data-amt="100">$100</button>
      </div>
    </div>
    <div class="action-row">
      <button class="btn-main btn-bet" id="actionBtn">PLACE BET</button>
    </div>
    <div class="options-row">
      <div class="option-group">
        <span class="option-label">AUTO CASHOUT</span>
        <div class="toggle" id="autoCashoutToggle"></div>
        <input type="number" class="auto-input" id="autoCashoutInput" value="2.00" min="1.01" max="1000" step="0.1">
      </div>
    </div>
  </div>
</div>

<script>
// ========== AUDIO ENGINE ==========
class AudioEngine {
  constructor() {
    this.ctx = null; this.enabled = true; this.initialized = false;
    this.windNode = null; this.windGain = null; this.heartOsc = null; this.heartGain = null;
  }
  init() {
    if (this.initialized) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.3;
    this.masterGain.connect(this.ctx.destination);
    this.initialized = true;
  }
  toggle() {
    this.enabled = !this.enabled;
    if (this.masterGain) this.masterGain.gain.value = this.enabled ? 0.3 : 0;
    return this.enabled;
  }
  startWind() {
    if (!this.initialized) return;
    const bufSize = this.ctx.sampleRate * 2;
    const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    this.windNode = this.ctx.createBufferSource();
    this.windNode.buffer = buf; this.windNode.loop = true;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 800; filter.Q.value = 0.5;
    this.windGain = this.ctx.createGain(); this.windGain.gain.value = 0.05;
    this.windNode.connect(filter); filter.connect(this.windGain); this.windGain.connect(this.masterGain);
    this.windNode.start();
  }
  updateWind(multiplier) {
    if (!this.windGain) return;
    const intensity = Math.min(0.4, 0.05 + (multiplier - 1) * 0.02);
    this.windGain.gain.setTargetAtTime(intensity, this.ctx.currentTime, 0.1);
  }
  stopWind() {
    if (this.windNode) { try { this.windNode.stop(); } catch(e){} this.windNode = null; }
    this.windGain = null;
  }
  startHeartbeat() {
    if (!this.initialized) return;
    this.heartGain = this.ctx.createGain(); this.heartGain.gain.value = 0;
    this.heartGain.connect(this.masterGain);
    this._heartbeatLoop(0.8);
  }
  _heartbeatLoop(interval) {
    if (!this.heartGain || !this.initialized) return;
    this._heartbeatInterval = interval;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sine'; osc.frequency.value = 55;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.3, now + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(g); g.connect(this.masterGain);
    osc.start(now); osc.stop(now + 0.25);
    this._heartTimer = setTimeout(() => this._heartbeatLoop(this._heartbeatInterval), interval * 1000);
  }
  updateHeartbeat(multiplier) {
    const interval = Math.max(0.2, 0.8 - (multiplier - 1) * 0.04);
    this._heartbeatInterval = interval;
  }
  stopHeartbeat() {
    clearTimeout(this._heartTimer); this.heartGain = null;
  }
  playBeep(freq = 880, dur = 0.1) {
    if (!this.initialized) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'square'; osc.frequency.value = freq;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.connect(g); g.connect(this.masterGain);
    osc.start(now); osc.stop(now + dur + 0.01);
  }
  playCashout() {
    if (!this.initialized) return;
    const now = this.ctx.currentTime;
    [1200, 1600, 2000].forEach((f, i) => {
      const osc = this.ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = f;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, now + i * 0.08); g.gain.linearRampToValueAtTime(0.2, now + i * 0.08 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.3);
      osc.connect(g); g.connect(this.masterGain);
      osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.35);
    });
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const n = this.ctx.createBufferSource(); n.buffer = buf;
    const flt = this.ctx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = 2000; flt.Q.value = 1;
    const g2 = this.ctx.createGain();
    g2.gain.setValueAtTime(0.15, now); g2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    n.connect(flt); flt.connect(g2); g2.connect(this.masterGain);
    n.start(now); n.stop(now + 0.6);
  }
  playCrash() {
    if (!this.initialized) return;
    const now = this.ctx.currentTime;
    setTimeout(() => {
      const t = this.ctx.currentTime;
      const buf = this.ctx.createBuffer(1, this.ctx.sampleRate, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (this.ctx.sampleRate * 0.15));
      const n = this.ctx.createBufferSource(); n.buffer = buf;
      const flt = this.ctx.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = 200;
      const g = this.ctx.createGain(); g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      n.connect(flt); flt.connect(g); g.connect(this.masterGain);
      n.start(t); n.stop(t + 0.7);
    }, 300);
  }
  playWindEvent(type) {
    if (!this.initialized) return;
    const now = this.ctx.currentTime;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 2, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const n = this.ctx.createBufferSource(); n.buffer = buf;
    const flt = this.ctx.createBiquadFilter();
    flt.type = 'bandpass';
    if (type === 'updraft') { flt.frequency.value = 600; flt.Q.value = 2; }
    else if (type === 'downdraft') { flt.frequency.value = 300; flt.Q.value = 1; }
    else { flt.frequency.value = 150; flt.Q.value = 0.5; }
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.25, now + 0.3);
    g.gain.setValueAtTime(0.25, now + 1.5); g.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
    n.connect(flt); flt.connect(g); g.connect(this.masterGain);
    n.start(now); n.stop(now + 3);
  }
}

// ========== PROVABLY FAIR ==========
function generateSeed() {
  const chars = '0123456789abcdef';
  let s = ''; for (let i = 0; i < 64; i++) s += chars[Math.floor(Math.random() * 16)];
  return s;
}
async function hashSeed(seed) {
  const enc = new TextEncoder().encode(seed);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ========== CRASH POINT ==========
function generateCrashPoint() {
  return Math.max(1.00, Math.floor(96.5 / (1 - Math.random()) * 100) / 100);
}
function cappedCrashPoint() {
  return Math.min(1000, generateCrashPoint());
}

// ========== BOTS ==========
const BOT_COLORS = ['#ff6688','#66ccff','#ffaa44','#88ff66','#cc88ff','#ff88cc','#88ffcc','#ffcc88','#aa88ff','#88aaff'];
function createBots() {
  const names = ['SkyCat','DiveKing','FreeFly','CloudNine','AirWolf','WindRider','FalconX','JetSet','StormDive','AceHigh'];
  return names.slice(0, 5 + Math.floor(Math.random() * 6)).map((name, i) => ({
    name, bet: Math.floor(Math.random() * 50 + 1),
    cashoutTarget: Math.random() < 0.6 ? 1.2 + Math.random() * 1.5 : (Math.random() < 0.7 ? 2.5 + Math.random() * 5 : 8 + Math.random() * 20),
    cashedOut: false, mult: null, color: BOT_COLORS[i % BOT_COLORS.length],
    canopyDeploy: 0
  }));
}

// ========== GAME STATE ==========
const state = {
  phase: 'BETTING',
  balance: 1000,
  bet: 10,
  betPlaced: false,
  sideBetOn: false,
  sideBetTarget: 3.0,
  autoCashoutOn: false,
  autoCashoutTarget: 2.0,
  crashPoint: 1.00,
  currentMultiplier: 1.00,
  roundStart: 0,
  roundDuration: 10,
  speed: 0,
  countdownLeft: 5,
  bettingTimer: 5,
  bots: [],
  history: [],
  seed: '',
  hash: '',
  particles: [],
  windParticles: [],
  clouds: [],
  stars: [],
  nebulae: [],
  fogLayers: [],
  shakeX: 0, shakeY: 0,
  windEvent: null,
  windEventTimer: 0,
  skydiverY: 0,
  skydiverLimbs: 0,
  parachuteOpen: false,
  cashoutMultiplier: 0,
  winAmount: 0,
  canopyDeploy: 0,
  crashTumble: 0,
  sunAngle: 0,
};

// ========== DOM REFS ==========
const $ = id => document.getElementById(id);
const canvas = $('gameCanvas');
const ctx = canvas.getContext('2d');
const audio = new AudioEngine();

// ========== CANVAS SETUP ==========
let W, H, dpr;
function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  initEnvironment();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ========== INIT ENVIRONMENT ==========
function initEnvironment() {
  state.clouds = [];
  // 3 layers of clouds with different sizes/speeds for parallax
  for (let layer = 0; layer < 3; layer++) {
    const count = layer === 0 ? 4 : (layer === 1 ? 6 : 8);
    for (let i = 0; i < count; i++) {
      state.clouds.push({
        x: Math.random() * W * 1.4 - W * 0.2,
        y: Math.random() * H,
        w: (80 + Math.random() * 120) * (1 - layer * 0.2),
        h: (25 + Math.random() * 40) * (1 - layer * 0.15),
        speed: (0.2 + Math.random() * 0.3) * (layer + 1),
        opacity: (0.5 - layer * 0.12) + Math.random() * 0.15,
        layer: layer,
        puffs: generateCloudPuffs()
      });
    }
  }

  state.stars = [];
  for (let i = 0; i < 200; i++) {
    state.stars.push({
      x: Math.random() * W, y: Math.random() * H,
      size: 0.3 + Math.random() * 2.5,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.5 + Math.random() * 3,
      hue: Math.random() < 0.1 ? (200 + Math.random() * 60) : 0,
      brightness: 0.5 + Math.random() * 0.5
    });
  }

  state.nebulae = [];
  for (let i = 0; i < 5; i++) {
    state.nebulae.push({
      x: Math.random() * W, y: Math.random() * H * 0.6,
      r: 40 + Math.random() * 80,
      hue: Math.random() * 360,
      alpha: 0.03 + Math.random() * 0.04
    });
  }

  state.fogLayers = [];
  for (let i = 0; i < 4; i++) {
    state.fogLayers.push({
      y: H * (0.2 + i * 0.2),
      thickness: 20 + Math.random() * 30,
      opacity: 0.05 + Math.random() * 0.08,
      speed: 0.1 + Math.random() * 0.15,
      offset: Math.random() * 100
    });
  }

  // init wind particles
  state.windParticles = [];
  for (let i = 0; i < 60; i++) {
    state.windParticles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      speed: 1 + Math.random() * 3,
      size: 0.5 + Math.random() * 1.5,
      opacity: 0.2 + Math.random() * 0.4
    });
  }
}

function generateCloudPuffs() {
  const puffs = [];
  const count = 4 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    puffs.push({
      ox: (Math.random() - 0.5) * 0.8,
      oy: (Math.random() - 0.5) * 0.5,
      rx: 0.2 + Math.random() * 0.35,
      ry: 0.25 + Math.random() * 0.35
    });
  }
  return puffs;
}

// ========== PARTICLE SYSTEM ==========
function spawnParticles(x, y, color, count = 10, opts = {}) {
  for (let i = 0; i < count; i++) {
    state.particles.push({
      x, y,
      vx: (opts.vx || 0) + (Math.random() - 0.5) * (opts.spread || 4),
      vy: (opts.vy || 0) + (Math.random() - 0.5) * (opts.spread || 4) - (opts.upward ? 3 : 0),
      life: 1, decay: 0.01 + Math.random() * (opts.decay || 0.02),
      color, size: (opts.size || 2) + Math.random() * (opts.sizeVar || 3),
      type: opts.type || 'circle'
    });
  }
}

// ========== RENDERING ==========
function getMultiplierColor(m) {
  if (m < 1.5) return '#00ff88';
  if (m < 2.5) return '#66ff44';
  if (m < 5) return '#ffcc00';
  if (m < 10) return '#ff8800';
  return '#ff3355';
}

function getSkyGradient(m) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  if (m < 1.5) {
    // low altitude - bright blue sky
    g.addColorStop(0, '#1a4a8a'); g.addColorStop(0.4, '#2a6ab0'); g.addColorStop(0.8, '#5a9ad8'); g.addColorStop(1, '#7ab8e8');
  } else if (m < 3) {
    g.addColorStop(0, '#12306a'); g.addColorStop(0.4, '#1a4a90'); g.addColorStop(0.8, '#3a70b0'); g.addColorStop(1, '#5090c8');
  } else if (m < 5) {
    g.addColorStop(0, '#0e1f4a'); g.addColorStop(0.4, '#1a3570'); g.addColorStop(0.8, '#2a5090'); g.addColorStop(1, '#3a70a8');
  } else if (m < 10) {
    g.addColorStop(0, '#06102a'); g.addColorStop(0.3, '#0c1838'); g.addColorStop(0.7, '#152850'); g.addColorStop(1, '#1e3868');
  } else if (m < 20) {
    g.addColorStop(0, '#020818'); g.addColorStop(0.3, '#060e25'); g.addColorStop(0.7, '#0c1838'); g.addColorStop(1, '#142548');
  } else {
    g.addColorStop(0, '#010410'); g.addColorStop(0.3, '#030815'); g.addColorStop(0.7, '#060e22'); g.addColorStop(1, '#0a1530');
  }
  return g;
}

// ========== SUN / LENS FLARE ==========
function drawSun(m, t) {
  if (m > 8) return; // sun below horizon at high altitude
  const sunX = W * 0.82;
  const sunY = H * 0.12 + Math.min(m * 5, 40);
  const sunAlpha = m > 6 ? Math.max(0, 1 - (m - 6) / 2) : 1;

  ctx.save();
  ctx.globalAlpha = sunAlpha;

  // sun glow (large)
  const glow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 80);
  glow.addColorStop(0, 'rgba(255,240,200,0.5)');
  glow.addColorStop(0.3, 'rgba(255,200,100,0.15)');
  glow.addColorStop(0.7, 'rgba(255,180,80,0.03)');
  glow.addColorStop(1, 'rgba(255,150,50,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(sunX - 80, sunY - 80, 160, 160);

  // sun core
  const core = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 16);
  core.addColorStop(0, 'rgba(255,255,240,1)');
  core.addColorStop(0.5, 'rgba(255,230,180,0.9)');
  core.addColorStop(1, 'rgba(255,200,120,0)');
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(sunX, sunY, 16, 0, Math.PI * 2); ctx.fill();

  // lens flare dots along a line from sun toward center
  const flareAlpha = 0.12 * sunAlpha;
  const dx = W * 0.5 - sunX, dy = H * 0.5 - sunY;
  [0.25, 0.45, 0.6, 0.8].forEach((frac, i) => {
    const fx = sunX + dx * frac;
    const fy = sunY + dy * frac;
    const fr = [6, 10, 4, 8][i];
    const fHue = [200, 120, 300, 60][i];
    ctx.globalAlpha = flareAlpha * (0.5 + 0.5 * Math.sin(t * 1.5 + i));
    const fg = ctx.createRadialGradient(fx, fy, 0, fx, fy, fr);
    fg.addColorStop(0, `hsla(${fHue},80%,70%,0.5)`);
    fg.addColorStop(1, `hsla(${fHue},80%,70%,0)`);
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI * 2); ctx.fill();
  });

  ctx.restore();
}

// ========== STARS, NEBULAE, AURORA ==========
function drawStars(m, t) {
  if (m < 4) return;
  const alpha = Math.min(1, (m - 4) / 8);
  state.stars.forEach(s => {
    const tw = Math.sin(s.twinkle + t * s.twinkleSpeed) * 0.35 + 0.65;
    ctx.globalAlpha = alpha * tw * s.brightness;
    if (s.hue > 0) {
      ctx.fillStyle = `hsl(${s.hue}, 60%, 80%)`;
    } else {
      ctx.fillStyle = '#ffffff';
    }
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
    // brighter stars get a cross spike
    if (s.size > 1.8) {
      ctx.globalAlpha = alpha * tw * 0.3;
      ctx.strokeStyle = ctx.fillStyle;
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(s.x - s.size * 2, s.y); ctx.lineTo(s.x + s.size * 2, s.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s.x, s.y - s.size * 2); ctx.lineTo(s.x, s.y + s.size * 2); ctx.stroke();
    }
  });
  ctx.globalAlpha = 1;

  // nebulae at high altitude
  if (m >= 8) {
    const nAlpha = Math.min(1, (m - 8) / 15);
    state.nebulae.forEach(n => {
      ctx.globalAlpha = n.alpha * nAlpha;
      const ng = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      ng.addColorStop(0, `hsla(${n.hue}, 70%, 50%, 0.3)`);
      ng.addColorStop(0.5, `hsla(${(n.hue + 30) % 360}, 60%, 40%, 0.1)`);
      ng.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ng;
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2); ctx.fill();
    });
  }

  // aurora at 10x+
  if (m >= 10) {
    const aAlpha = Math.min(0.2, (m - 10) / 40);
    ctx.globalAlpha = aAlpha;
    // wavy aurora bands
    for (let band = 0; band < 3; band++) {
      ctx.beginPath();
      const baseY = H * (0.6 + band * 0.08);
      ctx.moveTo(0, baseY);
      for (let x = 0; x <= W; x += 5) {
        const wave = Math.sin(x * 0.01 + t * 0.5 + band * 2) * 20 + Math.sin(x * 0.025 + t * 0.8) * 10;
        ctx.lineTo(x, baseY + wave);
      }
      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
      const ag = ctx.createLinearGradient(0, baseY - 30, 0, baseY + 60);
      const hue = [140, 180, 280][band];
      ag.addColorStop(0, `hsla(${hue}, 80%, 60%, 0.4)`);
      ag.addColorStop(0.5, `hsla(${hue + 20}, 70%, 50%, 0.15)`);
      ag.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ag;
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ========== VOLUMETRIC CLOUDS ==========
function drawClouds(m, t) {
  if (m > 12) return;
  const alpha = m > 8 ? Math.max(0, 1 - (m - 8) / 4) : 1;
  const scrollSpeed = state.phase === 'FALLING' ? (1 + (m - 1) * 0.5) : 0.2;
  let windMod = 1;
  if (state.windEvent === 'updraft') windMod = 0.3;
  else if (state.windEvent === 'downdraft') windMod = 2.5;

  // draw by layer for proper parallax
  for (let layer = 2; layer >= 0; layer--) {
    const layerSpeed = (layer + 1) * 0.5;
    state.clouds.filter(c => c.layer === layer).forEach(c => {
      c.y += c.speed * scrollSpeed * windMod * layerSpeed;
      if (c.y > H + 80) { c.y = -80; c.x = Math.random() * W * 1.2 - W * 0.1; }

      ctx.globalAlpha = c.opacity * alpha * (layer === 0 ? 1 : layer === 1 ? 0.7 : 0.45);

      // draw volumetric cloud with multiple puffs
      const cx = c.x, cy = c.y, cw = c.w, ch = c.h;

      // shadow layer (offset down and slightly transparent)
      ctx.fillStyle = 'rgba(80,100,140,0.25)';
      c.puffs.forEach(p => {
        ctx.beginPath();
        ctx.ellipse(cx + p.ox * cw + 3, cy + p.oy * ch + 4, p.rx * cw, p.ry * ch, 0, 0, Math.PI * 2);
        ctx.fill();
      });

      // main cloud body
      ctx.fillStyle = `rgba(220,230,245,${0.6 + layer * 0.1})`;
      c.puffs.forEach(p => {
        ctx.beginPath();
        ctx.ellipse(cx + p.ox * cw, cy + p.oy * ch, p.rx * cw, p.ry * ch, 0, 0, Math.PI * 2);
        ctx.fill();
      });

      // highlight on top
      ctx.fillStyle = `rgba(255,255,255,${0.3 + layer * 0.05})`;
      c.puffs.forEach(p => {
        ctx.beginPath();
        ctx.ellipse(cx + p.ox * cw - 2, cy + p.oy * ch - ch * 0.12, p.rx * cw * 0.7, p.ry * ch * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
      });
    });
  }
  ctx.globalAlpha = 1;
}

// ========== FOG LAYERS ==========
function drawFog(m, t) {
  if (m > 8) return;
  const fogAlpha = m > 5 ? Math.max(0, 1 - (m - 5) / 3) : 1;
  state.fogLayers.forEach(f => {
    const wave = Math.sin(t * f.speed + f.offset) * 15;
    ctx.globalAlpha = f.opacity * fogAlpha;
    const fg = ctx.createLinearGradient(0, f.y + wave - f.thickness, 0, f.y + wave + f.thickness);
    fg.addColorStop(0, 'rgba(180,200,230,0)');
    fg.addColorStop(0.5, 'rgba(180,200,230,1)');
    fg.addColorStop(1, 'rgba(180,200,230,0)');
    ctx.fillStyle = fg;
    ctx.fillRect(0, f.y + wave - f.thickness, W, f.thickness * 2);
  });
  ctx.globalAlpha = 1;
}

// ========== EARTH CURVATURE / TERRAIN ==========
function drawEarthCurvature(m, t) {
  if (m < 3) {
    // low altitude: ground terrain visible
    const terrainAlpha = Math.max(0, 1 - (m - 1) / 2);
    if (terrainAlpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = terrainAlpha * 0.4;
    // patchwork terrain at bottom
    const groundY = H - 30 + (m - 1) * 10;
    const grd = ctx.createLinearGradient(0, groundY - 40, 0, H);
    grd.addColorStop(0, 'rgba(40,80,40,0)');
    grd.addColorStop(0.3, 'rgba(50,100,50,0.3)');
    grd.addColorStop(0.6, 'rgba(60,90,40,0.5)');
    grd.addColorStop(1, 'rgba(80,120,60,0.6)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, groundY - 40, W, H - groundY + 40);
    // field lines
    ctx.strokeStyle = 'rgba(70,110,50,0.3)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 8; i++) {
      const fx = (i * W / 7 + t * 10) % (W + 40) - 20;
      ctx.beginPath(); ctx.moveTo(fx, groundY); ctx.lineTo(fx + 15, H); ctx.stroke();
    }
    ctx.restore();
  }

  // earth curvature at 5x+
  if (m >= 5) {
    const cAlpha = Math.min(0.6, (m - 5) / 8);
    ctx.save();
    ctx.globalAlpha = cAlpha;

    // atmospheric glow
    const glowY = H - 40;
    const aGlow = ctx.createLinearGradient(0, glowY - 30, 0, glowY + 20);
    aGlow.addColorStop(0, 'rgba(100,180,255,0)');
    aGlow.addColorStop(0.5, 'rgba(120,190,255,0.4)');
    aGlow.addColorStop(1, 'rgba(80,150,230,0.2)');
    ctx.fillStyle = aGlow;
    ctx.beginPath();
    ctx.ellipse(W / 2, H + 180, W * 1.6, 260, 0, Math.PI, 0);
    ctx.fill();

    // earth surface
    const eg = ctx.createLinearGradient(0, H - 50, 0, H);
    eg.addColorStop(0, 'rgba(40,100,60,0)');
    eg.addColorStop(0.3, 'rgba(50,120,80,0.3)');
    eg.addColorStop(0.7, 'rgba(40,90,60,0.5)');
    eg.addColorStop(1, 'rgba(30,70,50,0.6)');
    ctx.fillStyle = eg;
    ctx.beginPath();
    ctx.ellipse(W / 2, H + 200, W * 1.5, 270, 0, Math.PI, 0);
    ctx.fill();

    // horizon glow line
    ctx.globalAlpha = cAlpha * 0.6;
    ctx.strokeStyle = 'rgba(140,200,255,0.8)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(W / 2, H + 200, W * 1.5, 270, 0, Math.PI + 0.1, -0.1);
    ctx.stroke();

    ctx.restore();
  }
}

// ========== WIND PARTICLES ==========
function drawWindParticles(m, t) {
  if (state.phase !== 'FALLING') return;
  const intensity = Math.min(1, (m - 1) / 3);
  if (intensity <= 0) return;

  let speedMul = 1;
  if (state.windEvent === 'downdraft') speedMul = 3;
  else if (state.windEvent === 'updraft') speedMul = 0.3;

  state.windParticles.forEach(wp => {
    wp.y -= wp.speed * (1 + m * 0.5) * speedMul; // going up = falling effect
    if (wp.y < -10) { wp.y = H + 10; wp.x = Math.random() * W; }
    if (wp.y > H + 10) { wp.y = -10; wp.x = Math.random() * W; }

    ctx.globalAlpha = wp.opacity * intensity;
    ctx.fillStyle = '#ffffff';
    // streak shape
    ctx.beginPath();
    ctx.ellipse(wp.x, wp.y, wp.size * 0.3, wp.size * (1 + m * 0.3), 0, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ========== WIND EVENT PARTICLES ==========
function drawWindEventParticles(m, t) {
  if (!state.windEvent) return;

  if (state.windEvent === 'updraft') {
    // leaves/debris going up
    for (let i = 0; i < 6; i++) {
      const px = (W * 0.2 + i * W * 0.12 + Math.sin(t * 2 + i * 3) * 30) % W;
      const py = (H - (t * 80 + i * 60) % H) % H;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(t * 3 + i);
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = ['#4a8030','#6a9940','#8ab050'][i % 3];
      ctx.beginPath();
      ctx.ellipse(0, 0, 3, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  } else if (state.windEvent === 'downdraft') {
    // rain streaks
    ctx.strokeStyle = 'rgba(150,180,220,0.35)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 20; i++) {
      const rx = (i * 27 + t * 40) % W;
      const ry = (t * 300 + i * 37) % H;
      ctx.beginPath();
      ctx.moveTo(rx, ry);
      ctx.lineTo(rx - 2, ry + 15 + Math.random() * 10);
      ctx.stroke();
    }
  }
}

// ========== SPEED LINES ==========
function drawSpeedLines(m, t) {
  if (m < 1.3 && state.windEvent !== 'downdraft') return;
  let intensity = Math.min(30, (m - 1) * 4);
  if (state.windEvent === 'downdraft') intensity *= 2;

  for (let i = 0; i < intensity; i++) {
    const x = Math.random() * W;
    const y = (t * 500 * (1 + Math.random()) + i * 100) % (H + 100) - 50;
    const len = 25 + Math.random() * 50 + m * 5;
    const lineAlpha = 0.05 + Math.min(0.15, m * 0.01);
    ctx.strokeStyle = `rgba(255,255,255,${lineAlpha})`;
    ctx.lineWidth = 0.5 + Math.random() * 1;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + (Math.random() - 0.5) * 2, y + len); ctx.stroke();
  }
}

// ========== DETAILED SKYDIVER ==========
function drawSkydiver(t, m) {
  const wobbleX = Math.sin(t * 2) * (8 + Math.min(m, 10) * 0.5);
  const wobbleY = Math.sin(t * 3) * 5;
  let cx = W / 2 + wobbleX + state.shakeX;
  let cy = H * 0.47 + wobbleY + state.shakeY;

  if (state.windEvent === 'updraft') cy -= 18;
  else if (state.windEvent === 'downdraft') cy += 12;

  const limbPhase = t * 4;

  // motion blur / wind distortion aura
  drawMotionBlur(cx, cy, m, t);

  ctx.save();
  ctx.translate(cx, cy);

  const scale = 1.0; // base scale for ~90px character
  ctx.scale(scale, scale);

  const glowColor = getMultiplierColor(m);

  // subtle rotation from wind
  const tilt = Math.sin(t * 1.5) * 0.05 + (state.windEvent === 'updraft' ? -0.08 : state.windEvent === 'downdraft' ? 0.08 : 0);
  ctx.rotate(tilt);

  // ---- HARNESS CONTAINER (backpack) on back ----
  ctx.fillStyle = '#2a2a3a';
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  roundRect(-10, -16, 20, 14, 3);
  ctx.fill(); ctx.stroke();
  // container details
  ctx.fillStyle = '#383848';
  roundRect(-8, -14, 16, 4, 2);
  ctx.fill();
  ctx.fillStyle = glowColor;
  ctx.globalAlpha = 0.4;
  roundRect(-6, -8, 12, 3, 1);
  ctx.fill();
  ctx.globalAlpha = 1;

  // ---- SUIT / TORSO ----
  // suit body with flapping edges
  const flapL = Math.sin(limbPhase * 1.2) * 2;
  const flapR = Math.sin(limbPhase * 1.2 + 1) * 2;

  ctx.fillStyle = '#1a1a3a';
  ctx.beginPath();
  ctx.moveTo(-14 + flapL, -20);
  ctx.quadraticCurveTo(-18 + flapL, 0, -14 + flapL, 20);
  ctx.lineTo(14 + flapR, 20);
  ctx.quadraticCurveTo(18 + flapR, 0, 14 + flapR, -20);
  ctx.closePath();
  ctx.fill();

  // suit chest details
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(0, 16); ctx.stroke(); // center zipper
  ctx.strokeStyle = glowColor;
  ctx.lineWidth = 1.2;
  ctx.globalAlpha = 0.6;
  // racing stripes
  ctx.beginPath(); ctx.moveTo(-10, -18); ctx.lineTo(-10, 16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10, -18); ctx.lineTo(10, 16); ctx.stroke();
  ctx.globalAlpha = 1;

  // harness straps over suit
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-6, -16); ctx.lineTo(-10, 18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6, -16); ctx.lineTo(10, 18); ctx.stroke();
  // chest strap
  ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(10, 0); ctx.stroke();
  // buckle
  ctx.fillStyle = '#888';
  ctx.fillRect(-3, -2, 6, 4);

  // ---- ARMS (spread, arch position) ----
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const armWave = Math.sin(limbPhase) * 4;
  const armWave2 = Math.sin(limbPhase + 1) * 4;

  // left arm - suit
  ctx.lineWidth = 8;
  ctx.strokeStyle = '#1a1a3a';
  ctx.beginPath();
  ctx.moveTo(-14, -8);
  ctx.quadraticCurveTo(-28, -15 + armWave, -38 - armWave, -2 + armWave);
  ctx.stroke();
  // left arm stripe
  ctx.lineWidth = 2;
  ctx.strokeStyle = glowColor;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(-14, -8);
  ctx.quadraticCurveTo(-28, -15 + armWave, -38 - armWave, -2 + armWave);
  ctx.stroke();
  ctx.globalAlpha = 1;
  // left glove
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(-38 - armWave, -2 + armWave, 4, 0, Math.PI * 2); ctx.fill();

  // right arm - suit
  ctx.lineWidth = 8;
  ctx.strokeStyle = '#1a1a3a';
  ctx.beginPath();
  ctx.moveTo(14, -8);
  ctx.quadraticCurveTo(28, -15 + armWave2, 38 + armWave2, -2 + armWave2);
  ctx.stroke();
  ctx.lineWidth = 2;
  ctx.strokeStyle = glowColor;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(14, -8);
  ctx.quadraticCurveTo(28, -15 + armWave2, 38 + armWave2, -2 + armWave2);
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(38 + armWave2, -2 + armWave2, 4, 0, Math.PI * 2); ctx.fill();

  // ---- LEGS (spread, bent at knee) ----
  const legWave = Math.sin(limbPhase * 0.8) * 3;
  const legWave2 = Math.sin(limbPhase * 0.8 + 1.2) * 3;

  // left leg
  ctx.lineWidth = 8;
  ctx.strokeStyle = '#1a1a3a';
  ctx.beginPath();
  ctx.moveTo(-6, 18);
  ctx.quadraticCurveTo(-16, 28 + legWave, -22 - legWave, 42 + legWave);
  ctx.stroke();
  ctx.lineWidth = 2;
  ctx.strokeStyle = glowColor;
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.moveTo(-6, 18);
  ctx.quadraticCurveTo(-16, 28 + legWave, -22 - legWave, 42 + legWave);
  ctx.stroke();
  ctx.globalAlpha = 1;
  // boot
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-22 - legWave, 42 + legWave, 4, 0, Math.PI * 2); ctx.fill();

  // right leg
  ctx.lineWidth = 8;
  ctx.strokeStyle = '#1a1a3a';
  ctx.beginPath();
  ctx.moveTo(6, 18);
  ctx.quadraticCurveTo(16, 28 + legWave2, 22 + legWave2, 42 + legWave2);
  ctx.stroke();
  ctx.lineWidth = 2;
  ctx.strokeStyle = glowColor;
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.moveTo(6, 18);
  ctx.quadraticCurveTo(16, 28 + legWave2, 22 + legWave2, 42 + legWave2);
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(22 + legWave2, 42 + legWave2, 4, 0, Math.PI * 2); ctx.fill();

  // ---- HELMET ----
  // helmet shell
  const hg = ctx.createRadialGradient(0, -30, 2, 0, -30, 14);
  hg.addColorStop(0, '#ddd');
  hg.addColorStop(0.6, '#aaa');
  hg.addColorStop(1, '#666');
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.arc(0, -30, 13, 0, Math.PI * 2); ctx.fill();

  // visor
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(0, -27, 10, 7, 0, 0.1, Math.PI - 0.1);
  ctx.fill();

  // visor reflection / goggles shine
  ctx.fillStyle = 'rgba(100,180,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(-3, -28, 5, 3, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.ellipse(-4, -30, 2, 1.5, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // helmet stripe
  ctx.strokeStyle = glowColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -30, 13, -Math.PI * 0.7, -Math.PI * 0.3);
  ctx.stroke();

  // suit glow aura
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 15 + m * 0.5;
  ctx.strokeStyle = glowColor;
  ctx.globalAlpha = 0.15;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(0, 5, 20, 35, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawMotionBlur(cx, cy, m, t) {
  if (m < 1.2) return;
  const blurIntensity = Math.min(0.15, (m - 1) * 0.02);
  const streakLen = Math.min(40, m * 3);

  ctx.save();
  for (let i = 0; i < 5; i++) {
    const ox = (Math.random() - 0.5) * 20;
    ctx.globalAlpha = blurIntensity * (1 - i / 5);
    ctx.strokeStyle = 'rgba(150,180,220,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx + ox, cy - 30 - i * 3);
    ctx.lineTo(cx + ox + (Math.random() - 0.5) * 3, cy - 30 - i * 3 - streakLen);
    ctx.stroke();
  }
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ========== BOT SKYDIVERS (detailed mini versions) ==========
function drawBotSkydivers(t, m) {
  state.bots.forEach((bot, i) => {
    if (bot.cashedOut) return;
    const bx = W * 0.12 + (i % 5) * (W * 0.17) + Math.sin(t * 1.5 + i * 2) * 10;
    const by = H * 0.28 + (i % 3) * 35 + Math.sin(t * 2 + i) * 8;
    const lp = t * 3 + i;
    const sc = 0.45;

    ctx.save();
    ctx.translate(bx, by);
    ctx.scale(sc, sc);
    ctx.globalAlpha = 0.7;

    // suit body
    ctx.fillStyle = bot.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, 13, 18, 0, 0, Math.PI * 2);
    ctx.fill();

    // helmet
    ctx.fillStyle = '#aaa';
    ctx.beginPath(); ctx.arc(0, -24, 9, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.ellipse(0, -22, 7, 5, 0, 0.1, Math.PI - 0.1); ctx.fill();

    // arms
    ctx.strokeStyle = bot.color;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-11, -5); ctx.lineTo(-28 + Math.sin(lp) * 4, 2 + Math.cos(lp) * 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(11, -5); ctx.lineTo(28 - Math.sin(lp) * 4, 2 + Math.cos(lp + 1) * 5); ctx.stroke();

    // legs
    ctx.beginPath(); ctx.moveTo(-5, 16); ctx.lineTo(-16 + Math.sin(lp * 0.7) * 3, 34); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5, 16); ctx.lineTo(16 - Math.sin(lp * 0.7) * 3, 34); ctx.stroke();

    // backpack
    ctx.fillStyle = '#444';
    ctx.fillRect(-7, -14, 14, 10);

    ctx.restore();
    ctx.globalAlpha = 1;
  });
}

function drawBotParachutes(t) {
  state.bots.forEach((bot, i) => {
    if (!bot.cashedOut) return;
    const elapsed = t - bot.cashoutTime;
    const deployProgress = Math.min(1, elapsed * 2); // 0.5s to fully deploy
    const bx = W * 0.12 + (i % 5) * (W * 0.17) + Math.sin(t * 0.5 + i) * 20;
    const by = Math.min(H + 50, H * 0.3 + elapsed * 25);
    const drift = Math.sin(t * 0.8 + i) * 15;

    ctx.globalAlpha = Math.max(0, 1 - (by - H * 0.6) / (H * 0.5));
    if (ctx.globalAlpha <= 0) { ctx.globalAlpha = 1; return; }

    const canopyW = 22 * deployProgress;
    const canopyH = 14 * deployProgress;

    // canopy with panels
    ctx.fillStyle = bot.color;
    ctx.beginPath();
    ctx.ellipse(bx + drift, by - 30 * deployProgress, canopyW, canopyH, 0, Math.PI, 0);
    ctx.fill();
    // panel lines
    if (deployProgress > 0.5) {
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.5;
      for (let p = -2; p <= 2; p++) {
        ctx.beginPath();
        ctx.moveTo(bx + drift + p * (canopyW / 3), by - 30 * deployProgress - canopyH * 0.3);
        ctx.lineTo(bx + drift + p * (canopyW / 4), by - 30 * deployProgress + canopyH * 0.3);
        ctx.stroke();
      }
    }

    // lines
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 0.8;
    const numLines = 4;
    for (let l = 0; l < numLines; l++) {
      const lx = bx + drift + (l - (numLines - 1) / 2) * (canopyW / 2);
      ctx.beginPath();
      ctx.moveTo(lx, by - 30 * deployProgress + canopyH * 0.3);
      ctx.lineTo(bx + drift, by);
      ctx.stroke();
    }

    // body (mini skydiver)
    const sc = 0.3;
    ctx.fillStyle = bot.color;
    ctx.beginPath(); ctx.ellipse(bx + drift, by + 2, 5 * sc * 3, 8 * sc * 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#999';
    ctx.beginPath(); ctx.arc(bx + drift, by - 6, 4, 0, Math.PI * 2); ctx.fill();

    ctx.globalAlpha = 1;
  });
}

// ========== PARTICLES DRAW ==========
function drawParticles() {
  state.particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    if (p.type === 'dust') {
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size * p.life * 1.5, p.size * p.life, Math.random(), 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
}

// ========== CRASHED SCENE ==========
function drawCrashedScene(t, m) {
  // red flash
  const flashAlpha = Math.max(0, 0.6 - t * 3);
  if (flashAlpha > 0) {
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = '#ff3355';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // tumbling character
  if (t < 2) {
    const cx = W / 2 + Math.sin(t * 8) * (20 + t * 20);
    const cy = H * 0.47 + t * 60;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(t * 12); // fast tumble
    ctx.globalAlpha = Math.max(0, 1 - t * 0.5);

    // simplified tumbling body
    ctx.fillStyle = '#1a1a3a';
    ctx.beginPath(); ctx.ellipse(0, 0, 12, 16, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff3355';
    ctx.beginPath(); ctx.arc(0, -20, 10, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#1a1a3a'; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-10, -5); ctx.lineTo(-25, 10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10, -5); ctx.lineTo(25, 10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5, 14); ctx.lineTo(-15, 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5, 14); ctx.lineTo(15, 30); ctx.stroke();

    ctx.restore();
  }

  // impact dust cloud
  if (t > 0.3 && t < 2.5) {
    const dustAlpha = Math.max(0, 1 - (t - 0.3) / 2);
    const dustR = 20 + (t - 0.3) * 60;
    ctx.globalAlpha = dustAlpha * 0.4;
    const dg = ctx.createRadialGradient(W / 2, H * 0.7, 0, W / 2, H * 0.7, dustR);
    dg.addColorStop(0, 'rgba(180,150,120,0.6)');
    dg.addColorStop(0.6, 'rgba(150,130,100,0.2)');
    dg.addColorStop(1, 'rgba(120,100,80,0)');
    ctx.fillStyle = dg;
    ctx.beginPath(); ctx.arc(W / 2, H * 0.7, dustR, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ========== PLAYER PARACHUTE (deploy animation) ==========
function drawPlayerParachute(t, m) {
  const cx = W / 2 + Math.sin(t * 0.8) * 20;
  const cy = H * 0.47 + Math.min(80, t * 15);

  // deploy progress (canopy unfurls over 0.8s)
  const deployProgress = Math.min(1, t * 1.25);
  const jerkOffset = deployProgress < 1 ? Math.sin(deployProgress * Math.PI) * -20 * (1 - deployProgress) : 0;

  const canopyW = 40 * deployProgress;
  const canopyH = 22 * deployProgress;
  const canopyY = cy - 50 * deployProgress + jerkOffset;

  // canopy
  if (deployProgress > 0.1) {
    // canopy panels
    const numPanels = 7;
    for (let p = 0; p < numPanels; p++) {
      const panelHue = p % 2 === 0 ? '#00ff88' : '#00cc66';
      ctx.fillStyle = panelHue;
      const startAngle = Math.PI + (p / numPanels) * Math.PI;
      const endAngle = Math.PI + ((p + 1) / numPanels) * Math.PI;
      ctx.beginPath();
      ctx.ellipse(cx, canopyY, canopyW, canopyH, 0, startAngle, endAngle);
      ctx.lineTo(cx, canopyY);
      ctx.closePath();
      ctx.fill();
    }

    // canopy outline
    ctx.strokeStyle = 'rgba(0,255,136,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(cx, canopyY, canopyW, canopyH, 0, Math.PI, 0);
    ctx.stroke();

    // lines from canopy to body
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 0.8;
    for (let l = -3; l <= 3; l++) {
      const lx = cx + l * (canopyW / 4) * deployProgress;
      const ly = canopyY + canopyH * 0.3;
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(cx, cy + jerkOffset); ctx.stroke();
    }
  }

  // skydiver body (hanging under canopy)
  const bodyY = cy + jerkOffset;
  ctx.save();
  ctx.translate(cx, bodyY);

  // suit
  ctx.fillStyle = '#1a1a3a';
  ctx.beginPath(); ctx.ellipse(0, 5, 10, 15, 0, 0, Math.PI * 2); ctx.fill();

  // helmet
  ctx.fillStyle = '#00ff88';
  ctx.beginPath(); ctx.arc(0, -14, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.ellipse(0, -12, 6, 4, 0, 0, Math.PI); ctx.fill();

  // arms (relaxed, hanging)
  ctx.strokeStyle = '#1a1a3a'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-8, -2); ctx.lineTo(-14, 12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8, -2); ctx.lineTo(14, 12); ctx.stroke();

  // legs (together, hanging)
  ctx.beginPath(); ctx.moveTo(-4, 18); ctx.lineTo(-6, 34); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4, 18); ctx.lineTo(6, 34); ctx.stroke();

  ctx.restore();
}

// ========== VIGNETTE ==========
function drawVignette() {
  const vg = ctx.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.8);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

// ========== BETTING SCENE ==========
function drawBettingScene(t) {
  // airplane interior
  ctx.fillStyle = 'rgba(35, 45, 65, 0.4)';
  ctx.fillRect(0, 0, W, H);

  // fuselage walls
  const wallGrad = ctx.createLinearGradient(0, 0, W, 0);
  wallGrad.addColorStop(0, 'rgba(60,70,90,0.3)');
  wallGrad.addColorStop(0.1, 'rgba(50,60,80,0.1)');
  wallGrad.addColorStop(0.9, 'rgba(50,60,80,0.1)');
  wallGrad.addColorStop(1, 'rgba(60,70,90,0.3)');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, W, H);

  // airplane door/hatch with rounded corners
  const doorX = W / 2, doorY = H * 0.35;
  ctx.strokeStyle = 'rgba(0,220,255,0.25)';
  ctx.lineWidth = 3;
  roundRect(doorX - 45, doorY - 55, 90, 110, 8);
  ctx.stroke();

  // rivets around door
  ctx.fillStyle = 'rgba(120,140,160,0.3)';
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    const rx = doorX + Math.cos(angle) * 52;
    const ry = doorY + Math.sin(angle) * 62;
    ctx.beginPath(); ctx.arc(rx, ry, 1.5, 0, Math.PI * 2); ctx.fill();
  }

  // sky visible through door
  const dg = ctx.createRadialGradient(doorX, doorY, 5, doorX, doorY, 55);
  dg.addColorStop(0, 'rgba(80,160,230,0.5)');
  dg.addColorStop(0.7, 'rgba(40,100,180,0.3)');
  dg.addColorStop(1, 'rgba(20,40,80,0)');
  ctx.fillStyle = dg;
  roundRect(doorX - 43, doorY - 53, 86, 106, 6);
  ctx.fill();

  // wind streaks through door
  ctx.strokeStyle = 'rgba(200,220,255,0.1)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const sy = doorY - 40 + (t * 50 + i * 25) % 90;
    if (sy > doorY - 50 && sy < doorY + 50) {
      ctx.beginPath();
      ctx.moveTo(doorX - 30, sy);
      ctx.lineTo(doorX + 30, sy + 5);
      ctx.stroke();
    }
  }

  // green jump light
  const lightPhase = state.bettingTimer < 2 ? 1 : (Math.sin(t * 3) > 0 ? 0.8 : 0.3);
  const lightColor = state.bettingTimer < 2 ? '#00ff88' : '#ff3355';
  ctx.fillStyle = lightColor;
  ctx.globalAlpha = lightPhase;
  ctx.beginPath(); ctx.arc(doorX, doorY - 65, 5, 0, Math.PI * 2); ctx.fill();
  // light glow
  const lg = ctx.createRadialGradient(doorX, doorY - 65, 2, doorX, doorY - 65, 20);
  lg.addColorStop(0, lightColor + '40');
  lg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = lg;
  ctx.beginPath(); ctx.arc(doorX, doorY - 65, 20, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // waiting skydivers (bots) as seated figures
  state.bots.forEach((bot, i) => {
    const bx = 25 + (i % 4) * 45 + Math.sin(t * 0.5 + i) * 2;
    const by = H * 0.62 + Math.floor(i / 4) * 40;
    ctx.globalAlpha = 0.5;

    // seated body
    ctx.fillStyle = bot.color;
    ctx.beginPath(); ctx.ellipse(bx, by, 7, 11, 0, 0, Math.PI * 2); ctx.fill();
    // helmet
    ctx.fillStyle = '#999';
    ctx.beginPath(); ctx.arc(bx, by - 14, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.ellipse(bx, by - 12, 5, 3, 0, 0, Math.PI); ctx.fill();
    // legs (seated)
    ctx.strokeStyle = bot.color; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(bx - 4, by + 10); ctx.lineTo(bx - 8, by + 20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx + 4, by + 10); ctx.lineTo(bx + 8, by + 20); ctx.stroke();

    ctx.globalAlpha = 1;
  });
}

// ========== MAIN RENDER ==========
function render(timestamp) {
  const t = timestamp / 1000;
  ctx.clearRect(0, 0, W, H);

  // screen shake
  if (state.windEvent === 'turbulence') {
    state.shakeX = (Math.random() - 0.5) * 6;
    state.shakeY = (Math.random() - 0.5) * 6;
  } else {
    state.shakeX *= 0.9; state.shakeY *= 0.9;
  }

  const m = state.currentMultiplier;

  // sky background
  ctx.fillStyle = getSkyGradient(m);
  ctx.fillRect(0, 0, W, H);

  if (state.phase === 'BETTING' || state.phase === 'COUNTDOWN') {
    drawStars(1, t);
    drawClouds(1.5, t);
    drawSun(1, t);
    drawFog(1, t);
    drawBettingScene(t);
  } else if (state.phase === 'FALLING') {
    drawEarthCurvature(m, t);
    drawStars(m, t);
    drawClouds(m, t);
    drawSun(m, t);
    drawFog(m, t);
    drawSpeedLines(m, t);
    drawWindParticles(m, t);
    drawWindEventParticles(m, t);
    drawBotParachutes(t);
    drawBotSkydivers(t, m);
    drawSkydiver(t, m);
  } else if (state.phase === 'CRASHED') {
    const elapsed = (Date.now() - state.crashTime) / 1000;
    drawEarthCurvature(m, t);
    drawStars(m, t);
    drawClouds(m, t);
    drawBotParachutes(t);
    drawBotSkydivers(t, m);
    drawCrashedScene(elapsed, m);
  } else if (state.phase === 'CASHED_OUT') {
    const elapsed = (Date.now() - state.cashoutTime) / 1000;
    drawEarthCurvature(m, t);
    drawStars(m, t);
    drawClouds(m, t);
    drawSun(m, t);
    drawBotParachutes(t);
    drawBotSkydivers(t, m);
    drawPlayerParachute(elapsed, m);
  }

  // particles
  drawParticles();
  state.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= p.decay; });
  state.particles = state.particles.filter(p => p.life > 0);

  // vignette overlay
  drawVignette();

  requestAnimationFrame(render);
}

// ========== GAME LOOP ==========
let gameLoopTimer = null;

function updateUI() {
  $('balanceDisplay').textContent = state.balance.toFixed(2);

  // multiplier overlay
  const mo = $('multiplierOverlay');
  const mt = $('multiplierText');
  const pt = $('phaseText');

  if (state.phase === 'FALLING') {
    mo.style.display = 'block';
    mt.textContent = state.currentMultiplier.toFixed(2) + 'x';
    mt.style.color = getMultiplierColor(state.currentMultiplier);
    mt.style.textShadow = `0 0 30px ${getMultiplierColor(state.currentMultiplier)}40`;
    if (state.windEvent === 'turbulence') {
      mt.style.transform = `translate(${(Math.random()-0.5)*4}px, ${(Math.random()-0.5)*4}px)`;
    } else {
      mt.style.transform = '';
    }
    pt.style.display = 'none';
  } else if (state.phase === 'BETTING') {
    mo.style.display = 'none';
    pt.style.display = 'block';
    pt.className = 'phase-text countdown-text';
    pt.innerHTML = `PLACE BETS<br><span style="font-size:48px">${Math.ceil(state.bettingTimer)}</span>`;
  } else if (state.phase === 'COUNTDOWN') {
    mo.style.display = 'none';
    pt.style.display = 'block';
    pt.className = 'phase-text countdown-text';
    const c = Math.ceil(state.countdownLeft);
    pt.textContent = c > 0 ? c : 'JUMP!';
    pt.style.fontSize = c > 0 ? '64px' : '48px';
  } else if (state.phase === 'CRASHED') {
    mo.style.display = 'block';
    mt.textContent = state.crashPoint.toFixed(2) + 'x';
    mt.style.color = 'var(--red)';
    mt.style.textShadow = '0 0 30px rgba(255,51,85,0.5)';
    pt.style.display = 'block';
    pt.className = 'phase-text crashed-text';
    pt.textContent = 'CRASHED!';
  } else if (state.phase === 'CASHED_OUT') {
    mo.style.display = 'block';
    mt.textContent = state.cashoutMultiplier.toFixed(2) + 'x';
    mt.style.color = 'var(--green)';
    mt.style.textShadow = '0 0 30px rgba(0,255,136,0.5)';
    pt.style.display = 'block';
    pt.className = 'phase-text cashout-text';
    pt.innerHTML = `CASHED OUT!<br><span style="font-size:20px;color:var(--green)">+$${state.winAmount.toFixed(2)}</span>`;
  }

  // action button
  const btn = $('actionBtn');
  if (state.phase === 'BETTING') {
    if (state.betPlaced) {
      btn.className = 'btn-main btn-waiting';
      btn.textContent = 'BET PLACED \u2713';
      btn.disabled = true;
    } else {
      btn.className = 'btn-main btn-bet';
      btn.textContent = 'PLACE BET';
      btn.disabled = false;
    }
  } else if (state.phase === 'COUNTDOWN') {
    btn.className = 'btn-main btn-waiting';
    btn.textContent = 'JUMPING...';
    btn.disabled = true;
  } else if (state.phase === 'FALLING' && state.betPlaced) {
    btn.className = 'btn-main btn-cashout';
    btn.textContent = `PARACHUTE (${state.currentMultiplier.toFixed(2)}x)`;
    btn.disabled = false;
  } else if (state.phase === 'FALLING' && !state.betPlaced) {
    btn.className = 'btn-main btn-waiting';
    btn.textContent = 'WATCHING...';
    btn.disabled = true;
  } else {
    btn.className = 'btn-main btn-waiting';
    btn.textContent = 'NEXT ROUND...';
    btn.disabled = true;
  }

  // players panel
  updatePlayersPanel();

  // wind indicator
  const wi = $('windIndicator');
  if (state.windEvent) {
    wi.classList.add('visible');
    if (state.windEvent === 'updraft') { $('windIcon').textContent = '\u2B06'; $('windLabel').textContent = 'UPDRAFT'; $('windLabel').style.color = '#00ff88'; }
    else if (state.windEvent === 'downdraft') { $('windIcon').textContent = '\u2B07'; $('windLabel').textContent = 'DOWNDRAFT'; $('windLabel').style.color = '#ff3355'; }
    else { $('windIcon').textContent = '\uD83C\uDF00'; $('windLabel').textContent = 'TURBULENCE'; $('windLabel').style.color = '#ffcc00'; }
  } else {
    wi.classList.remove('visible');
  }
}

function updatePlayersPanel() {
  const panel = $('playersPanel');
  let html = '';
  state.bots.forEach(bot => {
    const cls = bot.cashedOut ? 'won' : (state.phase === 'CRASHED' ? 'lost' : 'active');
    const mult = bot.cashedOut ? bot.mult.toFixed(2) + 'x' : (state.phase === 'FALLING' ? '...' : '\u2014');
    html += `<div class="player-entry ${cls}"><span class="name">${bot.name}</span><span class="mult">${mult}</span></div>`;
  });
  panel.innerHTML = html;
}

function updateHistory() {
  const bar = $('historyBar');
  bar.innerHTML = state.history.slice(-20).reverse().map(h => {
    const cls = h.cp < 2 ? 'red' : (h.cp >= 10 ? 'gold' : 'green');
    return `<div class="history-dot ${cls}">${h.cp.toFixed(2)}x</div>`;
  }).join('');
}

// ========== GAME PHASES ==========
async function startBettingPhase() {
  state.phase = 'BETTING';
  state.betPlaced = false;
  state.bots = createBots();
  state.windEvent = null;
  state.parachuteOpen = false;
  state.particles = [];
  state.canopyDeploy = 0;
  state.crashTumble = 0;

  state.seed = generateSeed();
  state.hash = await hashSeed(state.seed);
  state.crashPoint = cappedCrashPoint();

  $('pfHash').textContent = state.hash;
  $('pfSeed').textContent = 'Revealed after round';
  $('pfCrash').textContent = '?';

  const cp = state.crashPoint;
  state.roundDuration = Math.max(8, Math.min(25, 5 + Math.log(cp) * 3.5));
  state.speed = Math.log(cp) / state.roundDuration;

  state.bettingTimer = 5;

  const tick = () => {
    if (state.phase !== 'BETTING') return;
    state.bettingTimer -= 0.05;
    if (state.bettingTimer <= 3 && state.bettingTimer > 0 && Math.ceil(state.bettingTimer) !== Math.ceil(state.bettingTimer + 0.05)) {
      audio.playBeep(660 + (3 - Math.ceil(state.bettingTimer)) * 220, 0.08);
    }
    if (state.bettingTimer <= 0) {
      startCountdown();
      return;
    }
    updateUI();
    setTimeout(tick, 50);
  };
  tick();
  updateUI();
}

function startCountdown() {
  state.phase = 'COUNTDOWN';
  state.countdownLeft = 3;
  audio.playBeep(1100, 0.15);

  const tick = () => {
    if (state.phase !== 'COUNTDOWN') return;
    state.countdownLeft -= 0.05;
    if (state.countdownLeft > 0 && Math.ceil(state.countdownLeft) !== Math.ceil(state.countdownLeft + 0.05)) {
      audio.playBeep(1100, 0.15);
    }
    if (state.countdownLeft <= 0) {
      audio.playBeep(1760, 0.2);
      startFalling();
      return;
    }
    updateUI();
    setTimeout(tick, 50);
  };
  tick();
  updateUI();
}

function startFalling() {
  state.phase = 'FALLING';
  state.roundStart = Date.now();
  state.currentMultiplier = 1.00;

  audio.startWind();
  audio.startHeartbeat();

  if (state.crashPoint > 2) {
    const eventRoll = Math.random();
    if (eventRoll < 0.25) scheduleWindEvent('updraft');
    else if (eventRoll < 0.45) scheduleWindEvent('downdraft');
    else if (eventRoll < 0.6) scheduleWindEvent('turbulence');
  }

  const tick = () => {
    if (state.phase !== 'FALLING') return;
    const elapsed = (Date.now() - state.roundStart) / 1000;
    state.currentMultiplier = Math.min(state.crashPoint, Math.exp(state.speed * elapsed));
    state.currentMultiplier = Math.floor(state.currentMultiplier * 100) / 100;

    audio.updateWind(state.currentMultiplier);
    audio.updateHeartbeat(state.currentMultiplier);

    state.bots.forEach(bot => {
      if (!bot.cashedOut && state.currentMultiplier >= bot.cashoutTarget) {
        bot.cashedOut = true;
        bot.mult = state.currentMultiplier;
        bot.cashoutTime = Date.now() / 1000;
      }
    });

    if (state.betPlaced && state.autoCashoutOn && state.currentMultiplier >= state.autoCashoutTarget) {
      doCashout();
      return;
    }

    if (state.windEventTimer > 0) {
      state.windEventTimer -= 0.016;
      if (state.windEventTimer <= 0) state.windEvent = null;
    }

    if (state.currentMultiplier >= state.crashPoint) {
      doCrash();
      return;
    }

    updateUI();
    setTimeout(tick, 16);
  };
  tick();
  updateUI();
}

function scheduleWindEvent(type) {
  const minDelay = type === 'downdraft' ? 2 : 3;
  const maxTime = state.roundDuration - 2;
  if (maxTime < minDelay + 1) return;
  const delay = minDelay + Math.random() * (maxTime - minDelay - 1);

  setTimeout(() => {
    if (state.phase !== 'FALLING') return;
    state.windEvent = type;
    state.windEventTimer = type === 'updraft' ? 3 : 2 + Math.random();
    audio.playWindEvent(type);
    if (type === 'turbulence') {
      spawnParticles(W / 2, H / 2, 'rgba(255,200,0,0.5)', 15);
    } else if (type === 'updraft') {
      // spawn leaf particles
      for (let i = 0; i < 10; i++) {
        spawnParticles(Math.random() * W, H, '#5a9040', 1, { vy: -3, spread: 2, decay: 0.005, type: 'dust' });
      }
    } else if (type === 'downdraft') {
      spawnParticles(W / 2, 0, 'rgba(150,180,220,0.4)', 20, { vy: 4, spread: 6, decay: 0.008 });
    }
  }, delay * 1000);
}

function doCashout() {
  if (state.phase !== 'FALLING' || !state.betPlaced) return;
  state.phase = 'CASHED_OUT';
  state.cashoutMultiplier = state.currentMultiplier;
  state.winAmount = state.bet * state.cashoutMultiplier;
  state.cashoutTime = Date.now();

  let sideBetWin = 0;
  if (state.sideBetOn) {
    if (state.crashPoint >= state.sideBetTarget) {
      sideBetWin = state.bet * 3;
    }
  }

  state.balance += state.winAmount + sideBetWin;

  audio.stopWind();
  audio.stopHeartbeat();
  audio.playCashout();

  spawnParticles(W / 2, H * 0.4, '#00ff88', 30, { spread: 6, upward: true });

  updateUI();

  setTimeout(() => {
    state.history.push({ cp: state.crashPoint, won: true, mult: state.cashoutMultiplier });
    updateHistory();
    revealFairness();
    setTimeout(startBettingPhase, 2000);
  }, 1500);
}

function doCrash() {
  state.phase = 'CRASHED';
  state.crashTime = Date.now();
  state.currentMultiplier = state.crashPoint;

  audio.stopWind();
  audio.stopHeartbeat();
  audio.playCrash();

  spawnParticles(W / 2, H * 0.4, '#ff3355', 35, { spread: 8 });
  // impact dust
  setTimeout(() => {
    spawnParticles(W / 2, H * 0.7, 'rgba(180,150,120,0.6)', 20, { spread: 5, vy: -1, decay: 0.008, type: 'dust', size: 4, sizeVar: 6 });
  }, 500);

  state.bots.forEach(bot => {
    if (!bot.cashedOut) { bot.cashedOut = false; }
  });

  updateUI();

  setTimeout(() => {
    state.history.push({ cp: state.crashPoint, won: false });
    updateHistory();
    revealFairness();
    setTimeout(startBettingPhase, 2000);
  }, 1500);
}

function revealFairness() {
  $('pfSeed').textContent = state.seed;
  $('pfCrash').textContent = state.crashPoint.toFixed(2) + 'x';
}

// ========== USER ACTIONS ==========
function placeBet() {
  if (state.phase !== 'BETTING' || state.betPlaced) return;
  const betAmt = parseFloat($('betInput').value) || 10;
  const totalBet = state.sideBetOn ? betAmt * 2 : betAmt;
  if (totalBet > state.balance) return;

  audio.init();
  audio.playBeep(880, 0.08);

  state.bet = betAmt;
  state.balance -= totalBet;
  state.betPlaced = true;
  state.autoCashoutOn = $('autoCashoutToggle').classList.contains('on');
  state.autoCashoutTarget = parseFloat($('autoCashoutInput').value) || 2.0;
  state.sideBetOn = $('sideBetToggle').classList.contains('on');
  state.sideBetTarget = parseFloat($('sideBetTarget').value) || 3.0;

  updateUI();
}

function handleAction() {
  if (state.phase === 'BETTING' && !state.betPlaced) {
    placeBet();
  } else if (state.phase === 'FALLING' && state.betPlaced) {
    doCashout();
  }
}

// ========== EVENT LISTENERS ==========
$('actionBtn').addEventListener('click', handleAction);

$('betMinus').addEventListener('click', () => {
  const inp = $('betInput');
  inp.value = Math.max(1, (parseFloat(inp.value) || 10) - 1);
});
$('betPlus').addEventListener('click', () => {
  const inp = $('betInput');
  inp.value = Math.min(500, (parseFloat(inp.value) || 10) + 1);
});

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    $('betInput').value = btn.dataset.amt;
  });
});

$('soundToggle').addEventListener('click', () => {
  audio.init();
  const on = audio.toggle();
  $('soundToggle').textContent = on ? '\uD83D\uDD0A' : '\uD83D\uDD07';
  $('soundToggle').classList.toggle('active', on);
});

$('fairToggle').addEventListener('click', () => {
  $('pfSection').classList.toggle('open');
});

$('autoCashoutToggle').addEventListener('click', () => {
  $('autoCashoutToggle').classList.toggle('on');
});

$('sideBetToggle').addEventListener('click', () => {
  $('sideBetToggle').classList.toggle('on');
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); handleAction(); }
});

// ========== START ==========
requestAnimationFrame(render);
startBettingPhase();
</script>
</body>
</html>
